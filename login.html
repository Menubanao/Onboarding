<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Authentication | Menu Banao</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
        rel="stylesheet" />

    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f97316",
                        secondary: "#ea580c",
                    },
                    animation: {
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideDown: {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                },
            },
        };
    </script>
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-['Inter'] min-h-screen flex flex-col transition-colors duration-300">
    <header class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a class="flex items-center gap-2 group" href="index.html">
                <div
                    class="w-80 h-10  rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                    <img src="logo.png" alt="logo" class="w-64 h-64 object-contain">
                </div>

            </a>
            <a href="https://wa.me/919528034775"
                class="px-5 py-2 text-sm font-semibold text-primary bg-primary/5 hover:bg-primary/10 rounded-full transition-all">
                Need Help?
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
        <div
            class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800 transition-all">
            <div class="p-8">
                <!-- Tab Controls -->
                <div class="flex p-1 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-8">
                    <button id="tab-login"
                        class="flex-1 py-2.5 text-center font-bold text-slate-500 rounded-xl transition-all bg-white dark:bg-slate-700 shadow-sm text-primary">Login</button>
                    <button id="tab-signup"
                        class="flex-1 py-2.5 text-center font-bold text-slate-500 rounded-xl transition-all">Sign
                        Up</button>
                </div>

                <!-- LOGIN SECTION -->
                <div id="section-login" class="space-y-6">
                    <div class="mb-8">
                        <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Welcome back</h1>
                        <p class="text-slate-500 dark:text-slate-400">Secure sign-in via OTP.</p>
                    </div>
                    <form id="form-login" class="space-y-5">
                        <div id="view-login-init" class="space-y-2">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email or
                                Phone</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">mail</span>
                                <input id="input-login-id"
                                    class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white"
                                    placeholder="Enter your email or phone" type="text" required />
                            </div>
                        </div>

                        <!-- Login OTP View (Hidden initially) -->
                        <div id="view-login-otp" class="space-y-2 hidden animate-slide-down">
                            <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Verification
                                Code</label>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">pin</span>
                                <input id="input-login-otp"
                                    class="w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white tracking-[0.5em] font-bold text-center"
                                    placeholder="••••••" type="text" maxlength="6" />
                            </div>
                        </div>

                        <div id="err-login" class="hidden text-xs text-red-500 font-medium ml-1"></div>
                        <button id="btn-login"
                            class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
                            type="submit">
                            <span>Get OTP</span>
                        </button>
                    </form>
                </div>

                <!-- SIGNUP SECTION -->
                <div id="section-signup" class="hidden space-y-6">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Create account</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">Start your digital menu journey.</p>
                    </div>
                    <form id="form-signup" class="space-y-4">
                        <!-- Step 1 & 2: Init (Name/Email) -->
                        <div id="view-signup-init" class="space-y-4 transition-all">
                            <div class="space-y-1.5">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Full
                                    Name</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">person</span>
                                    <input id="input-signup-name"
                                        class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white"
                                        placeholder="Enter your full name" type="text" />
                                </div>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email
                                    Address</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">mail</span>
                                    <input id="input-signup-email"
                                        class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white"
                                        placeholder="Enter your email address" type="email" />
                                </div>
                            </div>
                        </div>

                        <!-- Step 3: OTP View -->
                        <div id="view-signup-otp" class="space-y-4 hidden animate-slide-down">
                            <div class="space-y-1.5">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Verification
                                    Code</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">pin</span>
                                    <input id="input-signup-otp"
                                        class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white tracking-[0.5em] font-bold text-center"
                                        placeholder="••••••" type="text" maxlength="6" />
                                </div>
                            </div>
                        </div>

                        <!-- Step 4: Password Setup -->
                        <div id="view-signup-password" class="space-y-4 hidden animate-slide-down">
                            <div class="space-y-1.5">
                                <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Set
                                    Password</label>
                                <div class="relative">
                                    <span
                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">lock</span>
                                    <input id="input-signup-pass"
                                        class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white"
                                        placeholder="Minimum 6 characters" type="password" />
                                </div>
                            </div>
                        </div>

                        <!-- Step 5: Cafe Details -->
                        <div id="view-signup-cafe" class="space-y-4 hidden animate-slide-down">
                            <div class="space-y-3">
                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Cafe
                                        Name</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">store</span>
                                        <input id="input-signup-cafe-name"
                                            class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white"
                                            placeholder="e.g. Donero Cafe" type="text" />
                                    </div>
                                </div>
                                <div class="space-y-1.5">
                                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Business
                                        Address</label>
                                    <div class="relative">
                                        <span
                                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 dark:text-slate-400 text-[22px]">location_on</span>
                                        <textarea id="input-signup-cafe-address"
                                            class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary outline-none transition-all text-slate-900 dark:text-white min-h-[80px]"
                                            placeholder="Full business address"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="err-signup" class="hidden text-xs text-red-500 font-medium ml-1"></div>
                        <button id="btn-signup"
                            class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
                            type="submit">
                            <span>Get Started</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div class="px-8 pb-8 text-center">
            <p class="text-slate-500 dark:text-slate-400 text-xs">By continuing, you agree to Menu Banao terms and
                policies.</p>
        </div>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-sm">
        © 2024 MENU BANAO. All rights reserved
    </footer>

    <script>
        // --- Tab Switching ---
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const secLogin = document.getElementById('section-login');
        const secSignup = document.getElementById('section-signup');

        tabLogin.onclick = () => {
            secLogin.classList.remove('hidden');
            secSignup.classList.add('hidden');
            tabLogin.className = "flex-1 py-2.5 text-center font-bold text-primary rounded-xl transition-all bg-white dark:bg-slate-700 shadow-sm";
            tabSignup.className = "flex-1 py-2.5 text-center font-bold text-slate-500 rounded-xl transition-all";
        };

        tabSignup.onclick = () => {
            secSignup.classList.remove('hidden');
            secLogin.classList.add('hidden');
            tabSignup.className = "flex-1 py-2.5 text-center font-bold text-primary rounded-xl transition-all bg-white dark:bg-slate-700 shadow-sm";
            tabLogin.className = "flex-1 py-2.5 text-center font-bold text-slate-500 rounded-xl transition-all";
        };

        // --- Auth Logic ---
        let loginStep = 'ID'; // ID or OTP
        let signupStep = 'INIT'; // INIT or OTP

        const updateBtn = (btn, loading, text) => {
            btn.disabled = loading;
            btn.innerHTML = loading ? `<span>${text}...</span><span class="material-symbols-outlined animate-spin text-sm">sync</span>` : `<span>${text}</span>`;
        };

        // --- Handle Login ---
        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('input-login-id').value;
            const code = document.getElementById('input-login-otp').value;
            const errEl = document.getElementById('err-login');
            errEl.classList.add('hidden');

            if (loginStep === 'ID') {
                updateBtn(e.submitter, true, 'Sending OTP');
                try {
                    const isEmail = id.includes('@');
                    const { error } = await window.sbClient.auth.signInWithOtp(isEmail ? { email: id } : { phone: id });
                    if (error) throw error;
                    loginStep = 'OTP';
                    document.getElementById('view-login-otp').classList.remove('hidden');
                    document.getElementById('input-login-id').disabled = true;
                    updateBtn(e.submitter, false, 'Verify Code');
                } catch (err) {
                    errEl.innerText = err.message;
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Get OTP');
                }
            } else {
                updateBtn(e.submitter, true, 'Verifying');
                try {
                    const isEmail = id.includes('@');
                    const { data, error } = await window.sbClient.auth.verifyOtp({
                        ...(isEmail ? { email: id } : { phone: id }),
                        token: code,
                        type: isEmail ? 'magiclink' : 'sms'
                    });
                    if (error) throw error;
                    if (data.session) {
                        sessionStorage.setItem('donero_admin_auth', 'true');
                        window.location.href = '../Donero-Cafe/admin.html';
                    }
                } catch (err) {
                    errEl.innerText = err.message || "Invalid or expired code.";
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Verify Code');
                }
            }
        };

        // --- Handle Signup Steps ---
        document.getElementById('form-signup').onsubmit = async (e) => {
            e.preventDefault();
            const errEl = document.getElementById('err-signup');
            errEl.classList.add('hidden');

            const name = document.getElementById('input-signup-name').value;
            const email = document.getElementById('input-signup-email').value;
            const code = document.getElementById('input-signup-otp').value;
            const password = document.getElementById('input-signup-pass').value;
            const cafeName = document.getElementById('input-signup-cafe-name').value;
            const cafeAddress = document.getElementById('input-signup-cafe-address').value;

            if (signupStep === 'INIT') {
                updateBtn(e.submitter, true, 'Sending OTP');
                try {
                    const { error } = await window.sbClient.auth.signInWithOtp({
                        email, options: { data: { full_name: name }, shouldCreateUser: true }
                    });
                    if (error) throw error;
                    signupStep = 'OTP';
                    document.getElementById('view-signup-init').classList.add('hidden');
                    document.getElementById('view-signup-otp').classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Verify Code');
                } catch (err) {
                    errEl.innerText = err.message;
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Get Started');
                }
            }
            else if (signupStep === 'OTP') {
                updateBtn(e.submitter, true, 'Verifying');
                try {
                    const { data, error } = await window.sbClient.auth.verifyOtp({
                        email, token: code, type: 'signup'
                    });
                    if (error) throw error;

                    // On success, go to Password step
                    signupStep = 'PASSWORD';
                    document.getElementById('view-signup-otp').classList.add('hidden');
                    document.getElementById('view-signup-password').classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Set Password');
                } catch (err) {
                    errEl.innerText = err.message || "Incorrect code.";
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Verify Code');
                }
            }
            else if (signupStep === 'PASSWORD') {
                if (password.length < 6) {
                    errEl.innerText = "Password must be at least 6 characters.";
                    errEl.classList.remove('hidden');
                    return;
                }
                updateBtn(e.submitter, true, 'Saving');
                try {
                    const { error } = await window.sbClient.auth.updateUser({ password });
                    if (error) throw error;

                    signupStep = 'CAFE';
                    document.getElementById('view-signup-password').classList.add('hidden');
                    document.getElementById('view-signup-cafe').classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Complete Onboarding');
                } catch (err) {
                    errEl.innerText = err.message;
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Set Password');
                }
            }
            else if (signupStep === 'CAFE') {
                if (!cafeName || !cafeAddress) {
                    errEl.innerText = "Please fill in all cafe details.";
                    errEl.classList.remove('hidden');
                    return;
                }
                updateBtn(e.submitter, true, 'Finalizing');
                try {
                    const { data: { user } } = await window.sbClient.auth.getUser();
                    if (!user) throw new Error("User session not found.");

                    // Update profile with cafe details
                    const { error } = await window.sbClient.from('profiles').update({
                        cafe_branch: cafeName,
                        cafe_address: cafeAddress
                    }).eq('id', user.id);

                    if (error) throw error;

                    // Success! Redirect to Admin
                    sessionStorage.setItem('donero_admin_auth', 'true');
                    window.location.href = '../Donero-Cafe/admin.html';
                } catch (err) {
                    errEl.innerText = err.message;
                    errEl.classList.remove('hidden');
                    updateBtn(e.submitter, false, 'Complete Onboarding');
                }
            }
        };

        // On Load: Check existing session
        window.onload = async () => {
            if (window.sbClient) {
                const { data: { session } } = await window.sbClient.auth.getSession();
                if (session) window.location.href = '../Donero-Cafe/admin.html';
            }
            if (window.location.hash === '#signup') tabSignup.click();
        };
    </script>
</body>

</html>
