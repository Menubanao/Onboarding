<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Set Password | Menu Banao</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
        rel="stylesheet" />

    <!-- Supabase Logic -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabaseClient.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#f97316",
                        secondary: "#ea580c",
                    },
                    animation: {
                        'slide-down': 'slideDown 0.3s ease-out forwards',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s linear infinite',
                    },
                    keyframes: {
                        slideDown: {
                            '0%': { transform: 'translateY(-10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                            '50%': { opacity: '0.8', transform: 'scale(1.02)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        }
                    }
                },
            },
        };
    </script>
    <style>
        .btn-confirm {
            background: linear-gradient(90deg, #f97316 0%, #ea580c 50%, #f97316 100%);
            background-size: 200% auto;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
        }

        .btn-confirm:active {
            transform: translateY(0);
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 font-['Inter'] min-h-screen flex flex-col transition-colors duration-300">
    <header class="p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a class="flex items-center gap-2 group" href="index.html">
                <div
                    class="w-80 h-10 rounded-xl flex items-center justify-center group-hover:scale-105 transition-transform">
                    <img src="logo.png" alt="logo" class="w-64 h-64 object-contain">
                </div>
            </a>
            <a href="https://wa.me/919528034775"
                class="px-5 py-2 text-sm font-semibold text-primary bg-primary/5 hover:bg-primary/10 rounded-full transition-all">
                Need Help?
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
        <!-- Decoration background -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-3xl -z-10">
        </div>

        <div
            class="w-full max-w-[440px] bg-white dark:bg-slate-900 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-800 transition-all p-8">
            <div class="mb-8 text-center">
                <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
                </div>
                <h1 class="text-3xl font-black text-slate-900 dark:text-white mb-2">Set Password</h1>
                <p class="text-slate-500 dark:text-slate-400">Secure your account with a strong password.</p>
            </div>

            <form id="form-setup" class="space-y-6">
                <!-- New Password -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">New Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-[22px]">lock</span>
                        <input id="input-password"
                            class="w-full pl-10 pr-12 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white"
                            placeholder="••••••••" type="password" required />
                        <button type="button" onclick="togglePassword('input-password', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Confirm Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors text-[22px]">verified_user</span>
                        <input id="input-confirm"
                            class="w-full pl-10 pr-12 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-white"
                            placeholder="••••••••" type="password" required />
                        <button type="button" onclick="togglePassword('input-confirm', this)"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
                            <span class="material-symbols-outlined text-[20px]">visibility</span>
                        </button>
                    </div>
                </div>

                <div id="err-setup" class="hidden text-xs text-red-500 font-medium ml-1 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">error</span>
                    <span id="err-text">Passwords do not match</span>
                </div>

                <button id="btn-confirm"
                    class="w-full py-4 btn-confirm text-white font-bold rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2 group overflow-hidden relative"
                    type="submit">
                    <span class="relative z-10 flex items-center gap-2">
                        Confirm Password
                        <span
                            class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </span>
                    <!-- Shimmer effect -->
                    <div
                        class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]">
                    </div>
                </button>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-slate-400 text-sm">
        © 2024 MENU BANAO. All rights reserved
    </footer>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        document.getElementById('form-setup').onsubmit = async (e) => {
            e.preventDefault();
            const pass = document.getElementById('input-password').value;
            const confirm = document.getElementById('input-confirm').value;
            const errEl = document.getElementById('err-setup');
            const btn = document.getElementById('btn-confirm');

            if (pass !== confirm) {
                errEl.classList.remove('hidden');
                return;
            }
            errEl.classList.add('hidden');

            // Animation Feedback
            btn.disabled = true;
            btn.innerHTML = `
                <span class="flex items-center gap-2">
                    Setting up...
                    <span class="material-symbols-outlined animate-spin">sync</span>
                </span>
            `;

            try {
                // Here we would typically call Supabase password update
                // const { error } = await window.sbClient.auth.updateUser({ password: pass });
                // if (error) throw error;

                // Simulate success for demo
                setTimeout(() => {
                    btn.innerHTML = `
                        <span class="flex items-center gap-2 text-green-100">
                            Success!
                            <span class="material-symbols-outlined">check_circle</span>
                        </span>
                    `;
                    btn.classList.remove('btn-confirm');
                    btn.classList.add('bg-green-600');

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }, 1000);
            } catch (err) {
                errEl.querySelector('#err-text').innerText = err.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerHTML = `<span>Confirm Password</span>`;
            }
        };
    </script>
</body>

</html>
